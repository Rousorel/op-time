<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>VAS Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login" class="card">
    <div class="login-logo">
      <span class="logo-icon">📦</span>
      <h2>VAS Tracker</h2>
      <p>Ingresa tu usuario para continuar</p>
    </div>
    <input
      type="text"
      id="username"
      placeholder="Usuario"
      autocomplete="off"
      onkeypress="handleEnter(event)"
      required
    >
    <button onclick="guardarNombre()" class="btnLogin">Continuar →</button>
  </div>

  <!-- APP -->
  <div id="app" class="card" style="display:none;">

    <!-- HEADER -->
    <div class="header">
      <h2 id="saludo"></h2>
      <button class="logout" onclick="cerrarSesion()">Salir</button>
    </div>

    <!-- ACTIVIDAD EN CURSO -->
    <div id="actividadActiva" class="actividad-activa hidden">
      <h3>⚙️ Actividad en curso</h3>
      <p><strong>Actividad:</strong> <span id="act_tipo"></span></p>
      <p><strong>Cart:</strong> <span id="act_cart"></span></p>
      <p><strong>Cantidad:</strong> <span id="act_cantidad"></span></p>
      <p><strong>Tiempo:</strong> <span id="act_timer">0s</span></p>
    </div>

    <!-- SELECCIÓN DE ACTIVIDAD -->
    <div class="bloque">
      <h3>Actividad</h3>
      <select id="actividad" required>
        <option value="">Seleccione...</option>
        <option value="Consolidacion">Consolidacion</option>
        <option value="VAS">VAS</option>
        <option value="Empaque">Empaque</option>
        <option value="etiquetado manual">Etiquetado Manual</option>
        <option value="Decasing">Decasing</option>
      </select>
    </div>

    <!-- DATOS -->
    <div class="bloque">
      <h3>Datos</h3>
      <input
        type="text"
        id="cart"
        placeholder="Cart / HU"
        onkeypress="handleCartEnter(event)"
        autocomplete="off"
        required
      >
      <input
        type="number"
        id="cantidad"
        placeholder="Cantidad"
        onkeypress="handleCantidadEnter(event)"
        min="1"
        required
      >
    </div>

    <!-- BOTONES -->
    <div class="buttons">
      <button id="btnInicio" onclick="iniciarActividad()">▶ Iniciar</button>
      <button id="btnFin" onclick="finalizarActividad()" disabled>■ Finalizar</button>
    </div>

    <!-- HISTORIAL -->
    <div class="bloque">
      <h3>Actividades realizadas</h3>
      <ul id="historial"></ul>
    </div>

    <!-- ESTADO -->
    <p id="estado"></p>

  </div>

  <!-- MODAL -->
  <div id="modalFinalizacion" class="modal hidden">
    <div class="modal-content">
      <h3>¿Se finalizó con éxito?</h3>
      <p id="modalMensaje"></p>

      <div id="comentarioContainer" class="comentario-container hidden">
        <label>Comentario (opcional):</label>
        <textarea id="comentarioExitoso" placeholder="Ingrese un comentario..." rows="3"></textarea>
      </div>

      <div id="comentarioContainerFallo" class="comentario-container hidden">
        <label>Comentario (requerido):</label>
        <textarea id="comentarioFallo" placeholder="Describa qué incidencia ocurrió..." rows="3"></textarea>
      </div>

      <div class="modal-buttons">
        <button id="btnSi"       onclick="responderFinalizacion(true)"  class="btn-si">✓ Sí</button>
        <button id="btnNo"       onclick="responderFinalizacion(false)" class="btn-no">✗ No</button>
        <button id="btnConfirmar" onclick="confirmarFinalizacion()"     class="btn-confirmar hidden">Confirmar</button>
      </div>
    </div>
  </div>

</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- App scripts -->
<script src="js/firebase-config.js"></script>
<script src="js/data.js"></script>
<script src="js/usuarios.js"></script>
<script src="js/app.js"></script>

</body>
</html>
